name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          if grep -r "aws_access_key_id\|aws_secret_access_key\|password.*=" app/ --exclude-dir=node_modules; then
            echo "❌ Potential secrets found in code!"
            exit 1
          fi
          echo "✅ No secrets detected"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Lint Backend
        run: |
          cd app/backend
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Lint Frontend
        run: |
          cd app/frontend
          npm ci
          npm run build

      - name: Check Dockerfile best practices
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/backend/Dockerfile

      - name: PR size check
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l)
          if [ $CHANGED_FILES -gt 50 ]; then
            echo "⚠️ Warning: PR changes $CHANGED_FILES files. Consider splitting into smaller PRs."
          fi

      - name: Comment PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All automated checks passed! Ready for review.'
            })
