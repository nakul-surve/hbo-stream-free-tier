version: '3.8'

services:
  # Backend API (FastAPI) using ECR Image
  backend:
    image: ${ECR_REGISTRY}/hbo-stream-backend:${IMAGE_TAG:-latest}
    container_name: hbo-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
    networks:
      - hbo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (React) using ECR Image
  frontend:
    image: ${ECR_REGISTRY}/hbo-stream-frontend:${IMAGE_TAG:-latest}
    container_name: hbo-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://backend:8000
      - REACT_APP_CLOUDFRONT_URL=${REACT_APP_CLOUDFRONT_URL}
    networks:
      - hbo-network
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    build: ./nginx
    container_name: hbo-nginx
    restart: always
    ports:
      - "80:80"
    networks:
      - hbo-network
    depends_on:
      - frontend
      - backend

networks:
  hbo-network:
    driver: bridge
