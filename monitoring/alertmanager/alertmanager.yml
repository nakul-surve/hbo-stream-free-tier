global:
  resolve_timeout: 5m
  # SMTP configuration (Gmail example - you'll need to enable "Less secure app access")
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'your-email@gmail.com'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'
  smtp_require_tls: true

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route alerts to appropriate receivers
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    
    # Warning alerts - less urgent
    - match:
        severity: warning
      receiver: 'warning-alerts'

# Receivers (notification channels)
receivers:
  # Default receiver
  - name: 'default'
    email_configs:
      - to: 'your-email@gmail.com'
        headers:
          Subject: '[HBO-Stream] {{ .GroupLabels.alertname }}'

  # Critical alerts (email + Slack)
  - name: 'critical-alerts'
    email_configs:
      - to: 'your-email@gmail.com'
        headers:
          Subject: '🚨 [CRITICAL] HBO-Stream Alert'
        html: |
          <h2>Critical Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
    
    # Slack webhook (optional - uncomment and configure)
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
    #     channel: '#alerts'
    #     title: '🚨 Critical Alert'
    #     text: '{{ .CommonAnnotations.summary }}'

  # Warning alerts
  - name: 'warning-alerts'
    email_configs:
      - to: 'your-email@gmail.com'
        headers:
          Subject: '⚠️  [WARNING] HBO-Stream Alert'

# Inhibition rules (suppress alerts when others are firing)
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
